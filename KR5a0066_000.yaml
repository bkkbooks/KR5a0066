body:
  text: 元始洞真慈善孝子報恩成道經道言左右中真結形之始分於元始無上大道應化之氣孕靈瓊胎九萬大劫幽間寥寂九萬劫後法當應世結形理氣出於瓊胎出胎之時九天雷震九地開裂舉步之初登天寶華身出金光猶如初日二晨挾照晶彩朗耀眸有斗心星前曰象緣髮駢齒紫氣連霄所在之處七素之雲晨夕隂蓋隱龍負蓮以為牀座天燈天燭照明雲路天樂天梵萬音齊鼓龍鳳撫節謡歌太平雍雍和雅非可名目甘泉甘井飲之愈疾形如金玉無有衰老無為和化經九萬劫爾時三真化作嬰童託附真母以漸長大隨世成立無上大道元始天尊授此三真號曰至孝真王治化中國傍攝四夷有生之類成來受事教其慈孝敬天順地守一寶形憐憫萬物三千百年後又更攺新所謂淘汰津穢水火治錬是時三真孝工一治日中二治月中三治斗中上持三晨晶矅幽夜玄治三氣冥適空有應變修忽不待呼召如形出影不由憶想雖處上界道適下土無上無下無邊無際隨方設教友諸異類與其同好心無疑誤孝心髙逺神力無比回天轉地制御隂陽賖促運度驅役千靈感動祥瑞無翼而飛瞬息九萬屈伸之負巳周萬天皆由至孝慈順二親憐愍一切動植之類孝道慈悲好生惡殺食肉飲酒非孝道也男女穢慢非孝道也胎産尸敗非孝道也毁傷流血非孝道也偷劫竊盜非孝道也好習不善講論惡事非孝道也樂處穢賤內外流汙心形踈懶不修生道信心不篤輕浮彼好隨事放逐守一不專心氣離散生老病死種種煩惱死入地獄窮劫受苦永無出期無善因緣失吾孝道得種種苦下世男女修吾孝道與道同德既同德巳與道同光既同光巳與道同真既同真巳與道同身既同身巳與道同神既同神巳與道同變既同變巳與道同壽既同壽巳與道同有既同有巳與道同無既同無巳無處不無無處不無亦無處不有無處不有寂寥虛豁無處不無隨心應變或為帝王或為忠臣或為賢人或為孝子或為道士或為國師或棲寒林清齋苦行誦經念道立功立德或為良將不戰而勝或積榖帛濟惡飢寒或作明師除諸疾疫種種利益一切生有或不燈燭照明積夜或促萬劫以為一劫或延一劫以為百劫或一毫瑞而勝大地或一毛孔盛九大河及以四海不撓物性不覺不知或引十方世界勝一針鋒來對目前有生之類皆見三真光氣法身種種説法各得悟解奉吾孝道能入不可思議處能為不可思議事失吾孝道救苦不睱生死相續不可思議奉吾孝道得無畏果第一離生死怖畏得不生死果第二離暗障怖畏得光明果晝明神光夜照天燈久則身光無晝無夜第三離飢寒怖畏得天厨天衣果第四離衆試怖畏一切魔王及諸猛獸皆來受事而為侍衛第五離有形怖畏得入無形果入無形果者非滅非生而無形相即此凡身得成道身身同光氣升入無形同於虛空是故謂之得無形果髙下自任聚教隨心有無在意不待身心而所為也孝治天下不勞法今孝治其身志性堅正孝治百病天為醫之孝治萬物衆毒不害孝治山川草永不枯孝營生業田蠶萬倍孝至於天風雨以時孝至於地萬類安靜神芝靈术處處呈瑞孝至禽獸龍麟鸞鳯翔集境內孝至淵澤河侯獻珠魚龍踊躍靜息波浪但孝二親元元大恩天地萬靈晨夕侍衛行道守一自然得道孝道至大與無並生治於三光照曜幽夜有生之類侍賴無窮爾時靈童稽首敢問天尊下世世人多有不幸早喪二親孝心何申於是天尊答曰敬天順地朝禮三光如孝父母無有異也成道益連所願從心又順地者順於王氣朝禮五嶽大小便利不忤太歲順於四時修日新道期於八節請生謝罪內外芳潔披心露膽心香自熏洗滌荒穢精而復精猶嫌不精真而彌真猶嫌不真不真為真求吾真道邪魅應之卒至退敗生入邪道魂魄被縶顚狂惑亂自製一法敗黷道要以求利用贓滿罪積生身被考種種苦惱死入地獄遍遭湯炭永無出期縱得出世生墮六畜不如意中或生下賤盲聾瘖啞手足不具永不見道求不聞法為諸人畜之所擯役飢寒困苦性命危脆一失大道長淪惡趣不可思議道言有德之人孝心髙逺道合天地故天不能殺道不可滅故地不能埋如理瓊霜終成金寶不可毀壞上天入地無所滯礙往昔有人不識大道貪生畏死晨夕正念朝禮枯樹以求不死積四十年大道愍之勤苦不懈求其道氣如是枯樹一旦榮華此人歡喜彌加精進採服其華身遂得道修道之士取於不懈積功纍德心行日新神燈神香神光神通是道之信其志不巳道來降之教其真要定不虛也道言下世邪俗覩道幽驗因以求用規他施財入巳私費為邪所中終不得道慳貪不捨失慈悲道無孝順心為利奉道益其詐偽詐偽之罪天地不赦學道之士莫與共處應須訶責舉其過咎擯出治罪勿許詐悔更次道流收其贓賄以給貧病不得穢財以營神功道言孝治堂宇粧嚴精舍無令穿敗流俗士女卑賤熏臭瘡疣垢穢酒色喪産食啖魚肉茹葷辛者永絶彼往勿相親近勿履齋厨道言復有十惡五逆不孝隂賊誹謗毀訾破敗善道嫉妬傲慢貪媱嗜酒好啖魚肉田獵捕殺偷盜劫賊遵奉邪道心無慈孝志不平筌捨貧親富喜好嘲調情愛戰鬪習蓄器仗無忍辱心利己傷物孝道所忌人畜所畏不合聞道應須逺避勿相親近無上大道説此教戒為下世明王孝治天下為諸孝子報父母恩軌則家國使天下太平八表歸一咸遵至孝有得之者晨夕誦持不㨂男女無論貴賤皆令習誦以答二親元元大恩説此經時天現神燈處處明朗天鐘天磬天歌天樂空中自鼓天香天華隨風流轉家國人人供養是經思其義趣奉行其事傍勸木聞有用之者應精紙筆疏潔澡沐焚香抄寫百卷千卷流通供養香燈不絶心無懈倦必得成道不可思議元始洞真慈善孝子報恩成道經
