body:
  text: 元始洞真慈善孝子報恩成道經道言左右中真結形之始分於元始无上大道應化之氣孕靈瓊胎九萬大劫幽閑寥寂九萬劫後法當應世結形理氣岀於瓊胎岀胎之時九天雷震九地開裂舉歩之初登天寳華身岀金光猶如初日二晨挾照晶彩朗耀眸有斗心星前曰象縁髮駢齒紫氣連霄所在之處七素之雲晨夕隂蓋隱龍負蓮以爲牀座天燈天燭照明雲路天樂天梵萬音齊鼔龍鳳撫節謡歌太平邕邕和雅非可名目甘泉甘井飲之愈疾形如金玉无有衰老无爲和化經九萬劫爾時三真化作嬰童託附真母以漸長大隨世成立无上大道元始天尊授此三真號曰至孝真王治化中國傍攝四夷有生之類成來受事教其慈孝敬天順地守一寳形憐憫萬物三千百年後又更攺新所謂淘汰津穢水火治錬是時三真孝工一治日中二治月中三治斗中上持三晨晶矅幽夜玄治三氣㝠適空有應變修忽不待呼召如形出影不由憶想雖處上界道適下土无上无下无邊无際随方設教友諸異類與其同好心无疑悞孝心髙逺神力无比迴天轉地制御隂陽賖促運度驅役千靈感動祥瑞无翼而飛瞬息九萬屈伸之負巳周萬天皆由至孝慈順二親憐愍一切動植之類孝道慈悲好生惡殺食肉飲酒非孝道也男女穢慢非孝道也胎産屍敗非孝道也毁傷流血非孝道也偷劫竊盜非孝道也好習不善講論惡事非孝道也樂處穢賤内外流汙心形踈懶不修生道信心不篤輕浮彼好隨事放逐守一不專心氣離散生老病死種種煩惱死入地獄窮劫受苦永无出期无善因縁失吾孝道得種種苦下世男女修吾孝道與道同徳既同徳巳與道同光既同光巳與道同真既同真巳與道同身既同身巳與道同神既同神巳與道同變既同變巳與道同壽既同壽巳與道同有既同有巳與道同无既同无巳无處不无无處不无亦无處不有无處不有寂寥虛豁无處不无隨心應變或爲帝王或爲忠臣或爲賢人或爲孝子或爲道士或爲國師或棲寒林清齋苦行誦經念道立功立徳或爲良將不戰而勝或積榖帛濟惡飢寒或作明師除諸疾疫種種利益一切生有或不燈燭照明積夜或促萬劫以爲一刼或延一劫以爲百劫或一毫瑞而勝大地或一毛孔盛九大河及以四海不撓物性不覺不知或引十方世界勝一針鋒來對目前有生之類皆見三真光氣法身種種說法各得悟解奉吾孝道能入不可思議處能爲不可思議事失吾孝道救苦不睱生死相續不可思議奉吾孝道得无畏果第一離生死怖畏得不生死果第二離暗障怖畏得光明果晝明神光夜照天燈久則身光无晝无夜第三離飢寒怖畏得天厨天衣果第四離衆試怖畏一切魔王及諸猛獸皆來受事而爲侍衞第五離有形怖畏得入无形果入无形果者非滅非生而无形相即此凡身得成道身身同光氣昇入无形同於虚空是故謂之得无形果髙下自任聚教隨心有无在意不待身心而所爲也孝治天下不勞法今孝治其身志性堅正孝治百病天爲醫之孝治萬物衆毒不害孝治山川草永不枯孝營生業田蠶萬倍孝至於天風雨以時孝至於地萬類安靜神芝靈术處處呈瑞孝至禽獸龍麟鸞鳯翔集境內孝至淵澤河侯獻珠魚龍踊躍靜息波浪但孝二親元元大恩天地萬靈晨夕侍衞行道守一自然得道孝道至大與无並生治於三光照曜幽夜有生之類侍賴无窮爾時靈童稽首敢問天尊下世世人多有不幸早喪二親孝心何申於是天尊答曰敬天順地朝禮三光如孝父母无有異也成道益連所願從心又順地者順於王氣朝禮五嶽大小便利不忤太歳順於四時修日新道期於八節請生謝罪内外芳潔披心露膽心香自熏洗滌荒穢精而復精猶嫌不精真而彌真猶嫌不真不真爲真求吾真道邪魅應之卒至退敗生入邪道魂魄被縶顚狂惑亂自製一法敗黷道要以求利用贓滿罪積生身被考種種苦惱死入地獄遍遭湯炭永无出期縱得出世生墮六畜不如意中或生下賤盲聾瘖瘂手足不具永不見道求不聞法爲諸人畜之所𢷤役飢寒困苦性命危脆一失大道長淪惡趣不可思議道言有徳之人孝心髙逺道合天地故天不能殺道不可滅故地不能埋如理瓊霜終成金寳不可毀壞上天入地无所滯礙往昔有人不識大道貪生畏死晨夕正念朝禮枯樹以求不死積四十年大道愍之勤苦不懈求其道氣如是枯樹一旦榮華此人歡喜彌加精進採服其華身遂得道修道之士取於不懈積功累徳心行日新神燈神香神光神通是道之信其志不巳道來降之教其真要定不虚也道言下世邪俗覩道幽驗因以求用規他施財入巳私費爲邪所中終不得道慳貪不捨失慈悲道无孝順心爲利奉道益其詐僞詐僞之罪天地不赦學道之士莫與共處應須訶責舉其過咎擯出治罪勿許詐悔更次道流收其贓賄以給貧病不得穢財以營神功道言孝治堂宇粧嚴精舍无令穿敗流俗士女卑賤熏臭瘡疣垢穢酒色喪産食啖魚肉茹葷辛者永絶彼往勿相親近勿履齋厨道言復有十惡五逆不孝隂賊誹謗毀訾破敗善道嫉妬傲慢貪媱嗜酒好啖魚肉田獵捕殺偷盜劫賊遵奉邪道心无慈孝志不平筌捨貧親富喜好嘲調情愛戰闘習蓄器仗无忍辱心利己傷物孝道所忌人畜所畏不合聞道應須逺避勿相親近无上大道說此教戒爲下世明王孝治天下爲諸孝子報父母恩軌則家國使天下太平八表歸一咸遵至孝有得之者晨夕誦持不㨂男女无論貴賤皆令習誦以答二親元元大恩說此經時天現神燈處處明朗天鐘天磬天歌天樂空中自鼔天香天華隨風流轉家國人人供養是經思其義趣奉行其事傍勸木聞有用之者應精紙筆䟽潔澡沐焚香抄寫百巻千卷流通供養香燈不絶心无懈倦必得成道不可思議元始洞真慈善孝子報恩成道經
